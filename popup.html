<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Form AutoFill Saver</title>
  <style>
    body {
      width: 320px;
      font-family: -apple-system, Segoe UI, Roboto, sans-serif;
      padding: 12px;
      color: #1f2937;
    }
    h1 {
      font-size: 14px;
      margin: 0 0 8px;
    }
    .url {
      font-size: 11px;
      color: #6b7280;
      word-break: break-all;
      margin-bottom: 10px;
      background: #f3f4f6;
      padding: 6px;
      border-radius: 6px;
    }
    .row {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }
    input[type="text"] {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
    }
    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 600;
    }
    .btn-primary {
      background: #1e3a5f;
      color: white;
    }
    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }
    .profile-list {
      margin-top: 10px;
      max-height: 220px;
      overflow-y: auto;
    }
    .profile-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 8px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 13px;
    }
    .profile-actions button {
      padding: 4px 8px;
      font-size: 12px;
      margin-left: 4px;
    }
    .empty {
      font-size: 12px;
      color: #9ca3af;
      text-align: center;
      padding: 10px 0;
    }
    .status {
      font-size: 12px;
      color: #16a34a;
      min-height: 14px;
      margin-top: 6px;
    }
    .scope-toggle {
      font-size: 11px;
      color: #6b7280;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
  <h1>Form AutoFill Saver</h1>
  <div class="url" id="currentUrl">loading...</div>

  <label class="scope-toggle">
    <input type="checkbox" id="scopeExact" />
    Match exact URL (otherwise matches by full path, ignoring query string)
  </label>

  <div class="row">
    <input type="text" id="profileName" placeholder="Profile name (e.g. Test User 1)" />
    <button class="btn-primary" id="saveBtn">Save</button>
  </div>

  <div class="profile-list" id="profileList">
    <div class="empty">No saved profiles for this page yet.</div>
  </div>

  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
